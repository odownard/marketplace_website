{% extends 'layout.html' %}

{% block title %}
    New Listing
{% endblock %}

{% block content %}
    <section>
        <h1>New Listing</h1>
        <form class="form-with-validation" action="{% url 'listings:new-listing' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form }}
            <button class="form-submit">Create Listing</button>
        </form>
    </section>
{% endblock %}
