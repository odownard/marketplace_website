{% extends 'layout.html' %}

{% block title %}
    {{ listing.title }}
{% endblock %}

{% block content %}
    <div class="section-styling">
        <div class="banner">
            <img class="banner" src="{{ listing.banner.url }}" alt="{{ listing.title }}">
        </div>
        <h1>{{ listing.title }}</h1>
        <p>{{ listing.date }}</p>
        <p>{{ listing.body }}</p>
        <p>{{ listing.price }}</p>
        <p>{{ listing.location }}</p>
    </div>
{% endblock %}
