<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
        {% endblock %}
    </title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/main.js' %}" defer></script>
</head>
<body>
    <div class="outer-nav">
        <nav class="container">
            <a href="/" style="text-align: left;" id="home"><h1>ProductOverdose</h1></a>
            <h1 id="searchbar">Searchbar</h1>
            <a href="">Categories</a>
            <a href="">Saved Listings</a>
            <a href="{% url 'listings:new-listing' %}">
                <span aria-label="New Listing" title="New Listing">New Listing</span>
            </a>
            {% if user.is_authenticated %}

            {% else %}
                <a href="{% url 'users:register' %}">
                    <span aria-label="My Account" title="User Registration">User Registration</span>
                </a>
                <a href="{% url 'users:login' %}">
                    <span aria-label="User Login" title="User Login">User Login</span>
                </a>
            {% endif %}
            <form class="logout" action="{% url 'users:logout' %}" method="post">
                {% csrf_token %}
                <button class="logout-button" aria-label="User Logout" title="User Logout">Logout</button>
            </form>
        </nav>
    </div>
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
