{% extends 'layout.html' %}

{% block title %}
    User Login
{% endblock %}

{% block content %}
    <div class="user_authentication">
        <h1>Sign In</h1>
        <form class="form-with-valdiation" action="/users/login/" method="post">
            {% csrf_token %}
            {{ form }}
            {% if request.GET.next %}
                <input type="hidden" name="next" value="{{ request.GET.next }}" />
            {% endif %}    
            <button class="form_submit">Submit</button>
        </form>
    </div>
{% endblock %}
