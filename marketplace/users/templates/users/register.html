{% extends 'layout.html' %}

{% block title %}
    Register A New User
{% endblock %}

{% block content %}
    <div class="user_authentication">
        <h1 class="authentication_spacing">Register A New User</h1>
        <form class="authentication_spacing" action="/users/register/" method="post">
            {% csrf_token %}
            {{ form }}
            <button class="form_submit">Submit</button>
        </form>
        <p class="authentication_spacing">Already Have An Account? <a href="{% url 'users:login' %}">Sign In</a></p>
    </div>
{% endblock %}
